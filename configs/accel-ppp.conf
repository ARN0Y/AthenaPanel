###############################################################################
# /etc/accel-ppp/accel-ppp.conf
#
# L2TP/PPP daemon (replaces xl2tpd). IPsec is handled separately by Libreswan
# (hwdsl2), which protects UDP/1701 in transport mode. accel-ppp just terminates
# L2TP on the decrypted traffic.
#
#  * Auth      : chap-secrets at /etc/ppp/chap-secrets (managed by the panel)
#  * Pool      : 192.168.42.10-192.168.42.250, gw 192.168.42.1  (matches the
#                existing NAT/forward iptables rules, so nothing else changes)
#  * Hooks     : pppd_compat runs /etc/ppp/ip-up & /etc/ppp/ip-down (which
#                run-parts our /etc/ppp/ip-up.d/vpn-panel for accounting+shaping)
#  * Control   : accel-cmd on 127.0.0.1:2000 (panel uses it to terminate/reload)
#  * MTU       : 1280 to fit inside the doubly-encapsulated backhaul path
###############################################################################

[modules]
log_file
l2tp
auth_mschap_v2
auth_mschap_v1
auth_chap_md5
auth_pap
chap-secrets
ippool
pppd_compat

[core]
log-error=/var/log/accel-ppp/core.log
# Scale: ~1 worker thread per CPU core works well. Bump on big boxes.
thread-count=4

[common]
single-session=replace

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
# level 2 = warn/info-lite. Keep logs lean at scale (raise to 3-4 to debug).
level=2

[cli]
# accel-cmd defaults to port 2001 -> match it so bare `accel-cmd` works.
tcp=127.0.0.1:2001

[l2tp]
# Bind all addresses; decrypted L2TP arrives via the backhaul at 10.50.50.1.
bind=0.0.0.0
verbose=0
ppp-max-mtu=1280
host-name=athena-vpn

[ppp]
verbose=0
min-mtu=1000
mtu=1280
mru=1280
# IPsec already encrypts; Windows L2TP/IPsec does not use MPPE.
mppe=deny
lcp-echo-interval=30
lcp-echo-failure=3
lcp-echo-timeout=120
ipv4=require
ipv6=deny

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

[chap-secrets]
gw-ip-address=192.168.42.1
chap-secrets=/etc/ppp/chap-secrets

[ip-pool]
gw-ip-address=192.168.42.1
192.168.42.10-192.168.42.250

[pppd-compat]
verbose=0
ip-up=/etc/ppp/ip-up
ip-down=/etc/ppp/ip-down

# NOTE: the [connlimit] module is intentionally NOT enabled — it rate-limits
# new sessions globally and breaks logins at scale.
