###############################################################################
# /etc/accel-ppp/sstp.conf  —  SSTP-only accel-ppp instance (TCP/443, TLS)
#
# Runs ALONGSIDE xl2tpd: xl2tpd keeps L2TP/IPsec on udp/1701, this terminates
# SSTP on tcp/443. BOTH authenticate from the SAME /etc/ppp/chap-secrets the
# panel manages, so every user automatically works over L2TP *and* SSTP.
#
# setup-sstp.sh substitutes __SSL_PEM__ / __SSL_KEY__ with the Let's Encrypt
# cert paths for the SSTP domain.
###############################################################################

[modules]
log_file
sstp
auth_mschap_v2
auth_mschap_v1
auth_chap_md5
auth_pap
chap-secrets
ippool
shaper
pppd_compat

[core]
log-error=/var/log/accel-ppp/sstp-core.log
thread-count=4

[common]
single-session=replace

[log]
log-file=/var/log/accel-ppp/sstp.log
level=2

[cli]
# Same control port the panel uses (ACCEL_CLI) so `chap-secrets` reloads here
# when the panel adds/removes users.
tcp=127.0.0.1:2001

[sstp]
verbose=1
accept=ssl
# accel-ppp's sstp expects ONE PEM containing the full cert chain AND the
# private key. setup-sstp.sh builds it at /etc/accel-ppp/sstp-combined.pem
# (fullchain + privkey) and substitutes the path here. Using separate
# ssl-pemfile/ssl-keyfile fails on many builds (TLS negotiates no cipher).
ssl-pemfile=__SSL_PEM__
# host-name enforces SNI: if set, accel REJECTS any client that doesn't send a
# matching SNI with "unrecognized_name" — and many SSTP clients (some MikroTik
# configs, older clients) send no SNI. Leave it OFF so accel accepts everyone;
# the cert (CN=the SSTP domain) is still presented and verifiable.
#host-name=__SSTP_HOST__

[ppp]
verbose=0
min-mtu=1000
mtu=1400
mru=1400
mppe=deny
lcp-echo-interval=30
lcp-echo-failure=3
lcp-echo-timeout=120
ipv4=require
ipv6=deny

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

[chap-secrets]
gw-ip-address=192.168.44.1
chap-secrets=/etc/ppp/chap-secrets

[ip-pool]
gw-ip-address=192.168.44.1
192.168.44.10-192.168.44.250

[pppd-compat]
verbose=0
ip-up=/etc/ppp/ip-up
ip-down=/etc/ppp/ip-down

[client-ip-range]
# Source IPs allowed to OPEN an SSTP/TLS connection. Clients arrive SNAT'd as
# 10.50.50.x via the Iran relay; without this section accel-ppp rejects every
# SSTP connection ("IP is out of client-ip-range"). Auth is still enforced by
# chap-secrets, so allowing all sources here is safe.
0.0.0.0/0
