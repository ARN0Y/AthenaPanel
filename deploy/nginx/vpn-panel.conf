# /etc/nginx/sites-available/vpn-panel
# Serves the built React SPA under a SECRET path prefix and reverse-proxies /api.
# Hitting the bare IP / wrong path returns 444 (connection closed) so the panel
# is not discoverable. install.sh substitutes __PANEL_PORT__, __FRONTEND_DIST__
# and __PANEL_PATH__ (e.g. /admin-athena).

server {
    listen __PANEL_PORT__ default_server;
    listen [::]:__PANEL_PORT__ default_server;
    server_name _;

    # Let's Encrypt HTTP-01 challenge (used by setup-sstp.sh for the SSTP cert).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # The localhost-only ip-up/down hook must never be reachable from outside.
    location /api/internal { return 404; }

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Panel served ONLY under the secret prefix.
    location = __PANEL_PATH__ { return 301 __PANEL_PATH__/; }
    location ^~ __PANEL_PATH__/ {
        alias __FRONTEND_DIST__/;
        try_files $uri __PANEL_PATH__/index.html;
    }

    # Bare IP / root / anything else -> closed, panel stays hidden.
    location / { return 444; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    client_max_body_size 4m;
}
